<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Street Label — Nome de rua estilo Google Maps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #17191c;
      --surface2: #1f2125;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e8eaed;
      --text-muted: #8a8d94;
      --accent: #4285f4;
      --accent-dim: rgba(66,133,244,0.15);
      --radius: 10px;
      --radius-lg: 16px;
      --font: 'Inter', system-ui, sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 18px; height: 18px; fill: #fff; }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
    header span { font-size: 13px; color: var(--text-muted); margin-left: 4px; font-weight: 400; }

    /* ── Layout ── */
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .upload-zone {
      margin: 20px;
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius-lg);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-dim); }
    .upload-zone svg { display: block; margin: 0 auto 10px; opacity: 0.5; }
    .upload-zone strong { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 20px;
      margin: 16px 0 10px;
    }

    .ctrl-group {
      padding: 0 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .ctrl-group label {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }
    .ctrl-group label span { color: var(--text); font-weight: 500; }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      height: 4px;
      cursor: pointer;
    }

    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      cursor: pointer;
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

    .btn-dl {
      margin: 16px 20px 24px;
      width: calc(100% - 40px);
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-dl:hover { opacity: 0.9; }
    .btn-dl:active { transform: scale(0.98); }
    .btn-dl:disabled { opacity: 0.35; cursor: default; }

    /* ── Canvas area ── */
    .canvas-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: repeating-conic-gradient(#1a1b1f 0% 25%, #141518 0% 50%) 0 0 / 28px 28px;
      overflow: auto;
    }

    .canvas-wrap {
      position: relative;
      line-height: 0;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border2), 0 24px 64px rgba(0,0,0,0.6);
      max-width: 100%;
    }

    #previewCanvas { display: block; max-width: 100%; height: auto; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
    }
    .empty-state svg { opacity: 0.25; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); max-height: 55vh; }
      .canvas-area { min-height: 45vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  <h1>Street Label <span>— sobreposição de nome de rua em foto</span></h1>
</header>

<main>
  <aside>
    <!-- Upload -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()" role="button" tabindex="0" aria-label="Importar foto">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <strong>Importar foto</strong>
      Clique ou arraste uma imagem JPG/PNG
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <!-- Texto -->
    <p class="section-label">Texto</p>
    <div class="ctrl-group">
      <label>Nome da rua</label>
      <input type="text" id="streetName" value="R. Tereza Ivancheac" placeholder="R. Nome da Rua">
    </div>
    <div class="ctrl-group">
      <label>Estilo <span id="colorVal">—</span></label>
      <select id="textColor">
        <option value="white">Branco — Google Maps padrão</option>
        <option value="#c8c8c8" selected>Cinza — Street View original</option>
        <option value="#ffe082">Amarelo</option>
        <option value="#80cbc4">Ciano</option>
      </select>
    </div>

    <hr class="divider">

    <!-- Tamanho e rotação -->
    <p class="section-label">Posição e tamanho</p>
    <div class="ctrl-group">
      <label>Tamanho <span id="fontSizeVal">52px</span></label>
      <input type="range" id="fontSize" min="16" max="140" value="52" step="1">
    </div>
    <div class="ctrl-group">
      <label>Rotação <span id="rotationVal">-28°</span></label>
      <input type="range" id="rotation" min="-70" max="70" value="-28" step="1">
    </div>
    <div class="ctrl-group">
      <label>Horizontal <span id="posXVal">38%</span></label>
      <input type="range" id="posX" min="5" max="95" value="38" step="1">
    </div>
    <div class="ctrl-group">
      <label>Vertical <span id="posYVal">58%</span></label>
      <input type="range" id="posY" min="5" max="95" value="58" step="1">
    </div>

    <hr class="divider">

    <!-- Aparência -->
    <p class="section-label">Aparência</p>
    <div class="ctrl-group">
      <label>Opacidade <span id="opacityVal">72%</span></label>
      <input type="range" id="opacity" min="10" max="100" value="72" step="1">
    </div>
    <div class="ctrl-group">
      <label>Perspectiva (escala X) <span id="scaleXVal">72%</span></label>
      <input type="range" id="scaleX" min="20" max="100" value="72" step="1">
    </div>
    <div class="ctrl-group">
      <label>Espessura do outline <span id="outlineVal">médio</span></label>
      <input type="range" id="outline" min="1" max="5" value="3" step="1">
    </div>

    <!-- Download -->
    <button class="btn-dl" id="dlBtn" disabled onclick="downloadImage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v10M7 15l5 5 5-5"/><path d="M5 20h14"/></svg>
      Baixar imagem
    </button>
  </aside>

  <div class="canvas-area" id="canvasArea">
    <div class="empty-state" id="emptyState">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      Importe uma foto para começar
    </div>
    <div class="canvas-wrap" id="canvasWrap" style="display:none">
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</main>

<script>
  let img = null;
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');

  const outlineLabels = ['', 'fino', 'leve', 'médio', 'forte', 'grosso'];

  function g(id) { return document.getElementById(id); }
  function gv(id) { return g(id).value; }

  function render() {
    if (!img) return;
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);

    const text = gv('streetName') || 'R. Nome da Rua';
    const fontSize = parseInt(gv('fontSize'));
    const rotation = (parseInt(gv('rotation')) * Math.PI) / 180;
    const posX = (parseInt(gv('posX')) / 100) * canvas.width;
    const posY = (parseInt(gv('posY')) / 100) * canvas.height;
    const opacity = parseInt(gv('opacity')) / 100;
    const scaleX = parseInt(gv('scaleX')) / 100;
    const color = gv('textColor');
    const outlineW = parseInt(gv('outline'));

    ctx.save();
    ctx.translate(posX, posY);
    ctx.rotate(rotation);
    ctx.scale(scaleX, 1);
    ctx.globalAlpha = opacity;

    ctx.font = `italic bold ${fontSize}px 'Arial', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = fontSize * 0.3;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 2;

    ctx.strokeStyle = 'rgba(0,0,0,0.65)';
    ctx.lineWidth = fontSize * (outlineW * 0.025);
    ctx.lineJoin = 'round';
    ctx.strokeText(text, 0, 0);

    ctx.shadowColor = 'transparent';
    ctx.fillStyle = color;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function bind(id, suffix, labelId) {
    g(id).addEventListener('input', () => {
      g(labelId).textContent = id === 'outline'
        ? outlineLabels[parseInt(gv(id))]
        : gv(id) + suffix;
      render();
    });
  }

  bind('fontSize', 'px', 'fontSizeVal');
  bind('rotation', '°', 'rotationVal');
  bind('posX', '%', 'posXVal');
  bind('posY', '%', 'posYVal');
  bind('opacity', '%', 'opacityVal');
  bind('scaleX', '%', 'scaleXVal');
  bind('outline', '', 'outlineVal');
  g('streetName').addEventListener('input', render);
  g('textColor').addEventListener('change', render);

  function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const i = new Image();
      i.onload = () => {
        img = i;
        g('emptyState').style.display = 'none';
        g('canvasWrap').style.display = 'block';
        g('dlBtn').disabled = false;
        render();
      };
      i.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  g('fileInput').addEventListener('change', e => loadImage(e.target.files[0]));

  const zone = g('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag');
    loadImage(e.dataTransfer.files[0]);
  });
  zone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') g('fileInput').click(); });

  function downloadImage() {
    if (!img) return;
    const link = document.createElement('a');
    const name = (gv('streetName') || 'foto_rua').replace(/\s+/g, '_').toLowerCase();
    link.download = name + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>
</body>
</html>
