<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Street Label — Nome de rua estilo Google Maps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #17191c; --surface2: #1f2125;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #e8eaed; --text-muted: #8a8d94;
      --accent: #4285f4; --accent-dim: rgba(66,133,244,0.15);
      --radius: 10px; --radius-lg: 16px; --font: 'Inter', system-ui, sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:15px; min-height:100vh; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; gap:12px; padding:18px 28px; border-bottom:1px solid var(--border); background:var(--surface); }
    .logo { width:34px; height:34px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; }
    .logo svg { width:18px; height:18px; fill:#fff; }
    header h1 { font-size:17px; font-weight:600; }
    header span { font-size:13px; color:var(--text-muted); margin-left:4px; }
    main { display:grid; grid-template-columns:300px 1fr; flex:1; overflow:hidden; }
    aside { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; padding-bottom:20px; }
    .upload-zone { margin:16px; border:1.5px dashed var(--border2); border-radius:var(--radius-lg); padding:22px 16px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; color:var(--text-muted); font-size:13px; line-height:1.6; }
    .upload-zone:hover,.upload-zone.drag { border-color:var(--accent); background:var(--accent-dim); }
    .upload-zone strong { display:block; font-size:14px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .section-label { font-size:11px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; color:var(--text-muted); padding:0 16px; margin:14px 0 8px; }
    .ctrl-group { padding:0 16px 12px; display:flex; flex-direction:column; gap:5px; }
    .ctrl-group label { font-size:12px; color:var(--text-muted); display:flex; justify-content:space-between; }
    .ctrl-group label span { color:var(--text); font-weight:500; }
    input[type="text"] { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius); color:var(--text); font-family:var(--font); font-size:14px; padding:8px 10px; outline:none; }
    input[type="text"]:focus { border-color:var(--accent); }
    input[type="range"] { width:100%; accent-color:var(--accent); cursor:pointer; }
    select { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius); color:var(--text); font-family:var(--font); font-size:13px; padding:8px 10px; outline:none; cursor:pointer; }
    .divider { border:none; border-top:1px solid var(--border); margin:4px 0; }
    .btn-dl { margin:14px 16px 0; width:calc(100% - 32px); padding:12px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-family:var(--font); font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-dl:hover { opacity:.9; }
    .btn-dl:disabled { opacity:.35; cursor:default; }
    .canvas-area { display:flex; align-items:center; justify-content:center; padding:24px; background:repeating-conic-gradient(#1a1b1f 0% 25%,#141518 0% 50%) 0 0/28px 28px; overflow:auto; }
    .canvas-wrap { line-height:0; border-radius:var(--radius); overflow:hidden; box-shadow:0 0 0 1px var(--border2),0 24px 64px rgba(0,0,0,.6); max-width:100%; }
    #previewCanvas { display:block; max-width:100%; height:auto; }
    .empty-state { display:flex; flex-direction:column; align-items:center; gap:12px; color:var(--text-muted); font-size:14px; text-align:center; }
    .empty-state svg { opacity:.2; }
    .hint { font-size:11px; color:var(--text-muted); padding:0 16px 8px; line-height:1.5; }
    @media(max-width:700px){ main{grid-template-columns:1fr;grid-template-rows:auto 1fr;} aside{border-right:none;border-bottom:1px solid var(--border);max-height:55vh;} }
  </style>
</head>
<body>
<header>
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
  <h1>Street Label <span>— nome de rua estilo Google Maps</span></h1>
</header>
<main>
  <aside>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;margin:0 auto 8px;opacity:.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <strong>Importar foto</strong>Clique ou arraste JPG/PNG
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <p class="section-label">Texto</p>
    <div class="ctrl-group">
      <label>Nome da rua</label>
      <input type="text" id="streetName" value="R. Carlos Alberto Ribeiro Soares">
    </div>
    <div class="ctrl-group">
      <label>Cor</label>
      <select id="textColor">
        <option value="#cccccc" selected>Cinza — Street View</option>
        <option value="white">Branco</option>
        <option value="#ffe082">Amarelo</option>
      </select>
    </div>

    <hr class="divider">
    <p class="section-label">Posição</p>
    <div class="ctrl-group">
      <label>Horizontal <span id="posXVal">48%</span></label>
      <input type="range" id="posX" min="5" max="95" value="48" step="1">
    </div>
    <div class="ctrl-group">
      <label>Vertical (base do texto) <span id="posYVal">80%</span></label>
      <input type="range" id="posY" min="20" max="98" value="80" step="1">
    </div>

    <hr class="divider">
    <p class="section-label">Perspectiva 3D</p>
    <p class="hint">Simula o texto pintado no asfalto como no Google Maps</p>
    <div class="ctrl-group">
      <label>Tamanho (perto) <span id="sizeNearVal">80px</span></label>
      <input type="range" id="sizeNear" min="20" max="300" value="80" step="1">
    </div>
    <div class="ctrl-group">
      <label>Profundidade (longe/perto) <span id="depthVal">0.18</span></label>
      <input type="range" id="depth" min="1" max="60" value="18" step="1">
    </div>
    <div class="ctrl-group">
      <label>Ângulo da rua <span id="angleVal">-25°</span></label>
      <input type="range" id="angle" min="-80" max="80" value="-25" step="1">
    </div>
    <div class="ctrl-group">
      <label>Comprimento do texto <span id="lengthVal">1.0×</span></label>
      <input type="range" id="textLength" min="20" max="200" value="100" step="1">
    </div>
    <div class="ctrl-group">
      <label>Opacidade <span id="opacityVal">75%</span></label>
      <input type="range" id="opacity" min="10" max="100" value="75" step="1">
    </div>
    <div class="ctrl-group">
      <label>Outline <span id="outlineVal">3</span></label>
      <input type="range" id="outline" min="0" max="10" value="3" step="1">
    </div>

    <button class="btn-dl" id="dlBtn" disabled onclick="downloadImage()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v10M7 15l5 5 5-5"/><path d="M5 20h14"/></svg>
      Baixar imagem
    </button>
  </aside>

  <div class="canvas-area">
    <div class="empty-state" id="emptyState">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      Importe uma foto para começar
    </div>
    <div class="canvas-wrap" id="canvasWrap" style="display:none">
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</main>

<script>
// ── perspectiva por homografia ──────────────────────────────────────────────
// Dado 4 pontos destino (quadrilátero no chão) e o texto em canvas off-screen,
// mapeamos pixel a pixel via transformação perspectiva inversa.

let img = null;
const canvas = document.getElementById('previewCanvas');
const ctx    = canvas.getContext('2d');

function g(id){ return document.getElementById(id); }
function gv(id){ return g(id).value; }

// Resolve sistema 8x8 para homografia H (usando eliminação gaussiana simples)
function computeHomography(src, dst){
  // src e dst: array de 4 pontos {x,y}
  // H mapeia src -> dst
  const A = [], b = [];
  for(let i=0;i<4;i++){
    const sx=src[i].x, sy=src[i].y, dx=dst[i].x, dy=dst[i].y;
    A.push([sx,sy,1,0,0,0,-dx*sx,-dx*sy]);
    b.push(dx);
    A.push([0,0,0,sx,sy,1,-dy*sx,-dy*sy]);
    b.push(dy);
  }
  // Gauss
  const n=8;
  const M = A.map((row,i)=>[...row,b[i]]);
  for(let col=0;col<n;col++){
    let maxR=col;
    for(let r=col+1;r<n;r++) if(Math.abs(M[r][col])>Math.abs(M[maxR][col])) maxR=r;
    [M[col],M[maxR]]=[M[maxR],M[col]];
    const piv=M[col][col];
    for(let r=0;r<n;r++) if(r!==col){
      const f=M[r][col]/piv;
      for(let c=col;c<=n;c++) M[r][c]-=f*M[col][c];
    }
  }
  const h=M.map((row,i)=>row[n]/row[i]);
  return [...h,1]; // h[0..8], H[2][2]=1
}

// aplica H a ponto (x,y)
function applyH(H,x,y){
  const w = H[6]*x + H[7]*y + H[8];
  return { x:(H[0]*x+H[1]*y+H[2])/w, y:(H[3]*x+H[4]*y+H[5])/w };
}

function render(){
  if(!img) return;
  const W=img.naturalWidth, H=img.naturalHeight;
  canvas.width=W; canvas.height=H;
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(img,0,0);

  const text      = gv('streetName')||'R. Nome';
  const sizeNear  = parseInt(gv('sizeNear'));
  const depth     = parseInt(gv('depth'))/100;      // razão longe/perto (0..1)
  const angleDeg  = parseInt(gv('angle'));
  const posX      = parseInt(gv('posX'))/100*W;
  const posY      = parseInt(gv('posY'))/100*H;
  const opacity   = parseInt(gv('opacity'))/100;
  const outlineW  = parseInt(gv('outline'));
  const color     = gv('textColor');
  const lenScale  = parseInt(gv('textLength'))/100;

  // --- texto em canvas offscreen (sem perspectiva) ---
  const off = document.createElement('canvas');
  const oc  = off.getContext('2d');
  oc.font = `italic bold ${sizeNear}px Arial,sans-serif`;
  const tw = oc.measureText(text).width * lenScale;
  const th = sizeNear * 1.3;
  off.width  = Math.ceil(tw + sizeNear*0.4);
  off.height = Math.ceil(th);

  oc.font = `italic bold ${sizeNear}px Arial,sans-serif`;
  oc.textAlign='left'; oc.textBaseline='top';
  if(outlineW>0){
    oc.shadowColor='rgba(0,0,0,.9)'; oc.shadowBlur=sizeNear*.2;
    oc.shadowOffsetX=1; oc.shadowOffsetY=1;
    oc.strokeStyle='rgba(0,0,0,.7)';
    oc.lineWidth=outlineW*(sizeNear/40); oc.lineJoin='round';
    oc.strokeText(text, sizeNear*.1, sizeNear*.1);
  }
  oc.shadowColor='transparent';
  oc.fillStyle=color;
  oc.fillText(text, sizeNear*.1, sizeNear*.1);

  const OW=off.width, OH=off.height;

  // --- 4 cantos do offscreen (src) ---
  const src = [
    {x:0,  y:0 },   // TL
    {x:OW, y:0 },   // TR
    {x:OW, y:OH},   // BR
    {x:0,  y:OH},   // BL
  ];

  // --- 4 cantos destino: quadrilátero "deitado no chão" ---
  // O texto tem base na posição (posX, posY).
  // Altura perto = sizeNear, altura longe = sizeNear * depth
  // O ângulo da rua rotaciona o eixo longitudinal do texto.
  const rad = angleDeg * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);

  const hNear = sizeNear;        // altura (na normal à rua) na base
  const hFar  = sizeNear*depth;  // altura no topo (longe)
  const len   = OW * (hNear/OH); // comprimento projetado na base

  // vetor ao longo da rua (longitudinal)
  const lx =  cos, ly = sin;
  // vetor normal (perpendicular, aponta "para cima" na perspectiva)
  const nx = -sin, ny = cos;

  // 4 cantos do quadrilátero no espaço da imagem:
  // BL e BR na base (perto), TL e TR no topo (longe)
  const BL = { x: posX,          y: posY          };
  const BR = { x: posX + lx*len, y: posY + ly*len };
  const TR = { x: BR.x + nx*hFar*(-1), y: BR.y + ny*hFar*(-1) };
  const TL = { x: BL.x + nx*hFar*(-1), y: BL.y + ny*hFar*(-1) };

  const dst = [TL, TR, BR, BL];

  // --- homografia src->dst ---
  let Hmat;
  try { Hmat = computeHomography(src, dst); }
  catch(e){ return; }

  // --- desenhar pixel a pixel via canvas scanline com putImageData ---
  // Bounding box do quadrilátero
  const xs = dst.map(p=>p.x), ys = dst.map(p=>p.y);
  const x0=Math.max(0,Math.floor(Math.min(...xs))-2);
  const y0=Math.max(0,Math.floor(Math.min(...ys))-2);
  const x1=Math.min(W,Math.ceil(Math.max(...xs))+2);
  const y1=Math.min(H,Math.ceil(Math.max(...ys))+2);
  const bw=x1-x0, bh=y1-y0;
  if(bw<=0||bh<=0) return;

  // Homografia inversa: dst->src
  const srcPts = [
    {x:0,  y:0 },{x:OW,y:0 },{x:OW,y:OH},{x:0,y:OH}
  ];
  let Hinv;
  try { Hinv = computeHomography(dst, src); }
  catch(e){ return; }

  // pixels do offscreen
  const offData = oc.getImageData(0,0,OW,OH);
  const imgData = ctx.getImageData(x0,y0,bw,bh);
  const od = offData.data, id = imgData.data;

  for(let py=0;py<bh;py++){
    for(let px=0;px<bw;px++){
      const ix=px+x0, iy=py+y0;
      // mapeia pixel destino -> fonte (offscreen)
      const sp = applyH(Hinv, ix, iy);
      const sx=Math.round(sp.x), sy=Math.round(sp.y);
      if(sx<0||sy<0||sx>=OW||sy>=OH) continue;
      const si=(sy*OW+sx)*4;
      const a = od[si+3];
      if(a===0) continue;
      const di=(py*bw+px)*4;
      const af = (a/255)*opacity;
      id[di  ] = id[di  ]*(1-af) + od[si  ]*af;
      id[di+1] = id[di+1]*(1-af) + od[si+1]*af;
      id[di+2] = id[di+2]*(1-af) + od[si+2]*af;
      id[di+3] = 255;
    }
  }
  ctx.putImageData(imgData, x0, y0);
}

// ── binds ────────────────────────────────────────────────────────────────────
function bindSlider(id, fmt){
  g(id).addEventListener('input', ()=>{
    const v = parseFloat(gv(id));
    g(id+'Val').textContent = fmt(v);
    render();
  });
}
bindSlider('posX',       v=>v+'%');
bindSlider('posY',       v=>v+'%');
bindSlider('sizeNear',   v=>v+'px');
bindSlider('depth',      v=>(v/100).toFixed(2));
bindSlider('angle',      v=>v+'°');
bindSlider('textLength', v=>(v/100).toFixed(1)+'×');
bindSlider('opacity',    v=>v+'%');
bindSlider('outline',    v=>v);
g('streetName').addEventListener('input', render);
g('textColor').addEventListener('change', render);

// ── load ─────────────────────────────────────────────────────────────────────
function loadImage(file){
  if(!file||!file.type.startsWith('image/')) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const i=new Image();
    i.onload=()=>{
      img=i;
      g('emptyState').style.display='none';
      g('canvasWrap').style.display='block';
      g('dlBtn').disabled=false;
      render();
    };
    i.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
g('fileInput').addEventListener('change',e=>loadImage(e.target.files[0]));
const zone=g('uploadZone');
zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('drag');});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');loadImage(e.dataTransfer.files[0]);});

function downloadImage(){
  if(!img) return;
  const link=document.createElement('a');
  link.download=(gv('streetName')||'foto_rua').replace(/\s+/g,'_').toLowerCase()+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
